<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emes CBT – Login</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/dYwR4Jp.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--em50:#ecfdf5;--em200:#a7f3d0;--em500:#10b981;--em600:#059669;--em700:#047857;--em800:#065f46;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g800:#1f2937;--white:#ffffff;--r:6px;--r-lg:10px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 40%,#d1fae5 70%,#ecfdf5 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--g800);padding:12px 16px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 20%,rgba(4,120,87,.06) 0%,transparent 70%),radial-gradient(ellipse 500px 350px at 80% 80%,rgba(16,185,129,.05) 0%,transparent 70%);pointer-events:none;}
.login-wrapper{width:100%;max-width:420px;z-index:1;}
.login-header{text-align:center;margin-bottom:16px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.login-logo{width:52px;height:52px;object-fit:contain;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(4,120,87,.2));}
.login-app-name{font-size:22px;font-weight:700;color:var(--em800);letter-spacing:-0.5px;line-height:1.1;}
.login-app-sub{font-size:12px;color:var(--em600);font-weight:400;letter-spacing:0.3px;}
.school-name{font-size:12px;color:var(--g500);margin-top:2px;}
.login-card{background:var(--white);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid var(--g100);overflow:hidden;}
.login-tabs{display:flex;border-bottom:1px solid var(--g100);background:var(--g50);}
.tab-btn{flex:1;padding:11px 16px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:transparent;border:none;cursor:pointer;color:var(--g400);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn.active{color:var(--em700);border-bottom-color:var(--em700);background:var(--white);}
.tab-btn:hover:not(.active){color:var(--g600);background:var(--g100);}
.login-body{padding:20px 24px 18px;}
.form-title{font-size:15px;font-weight:600;color:var(--g800);margin-bottom:2px;}
.form-subtitle{font-size:12px;color:var(--g400);margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px;}
.input-wrapper{position:relative;}
.input-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:13px;pointer-events:none;}
.form-control{width:100%;height:38px;padding:0 36px;border:1px solid var(--g200);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--g800);background:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.form-control:focus{border-color:var(--em500);box-shadow:0 0 0 3px rgba(16,185,129,.10);}
.toggle-pw{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--g400);font-size:13px;padding:4px;transition:color .2s;}
.toggle-pw:hover{color:var(--g600);}
.btn-login{width:100%;height:40px;background:var(--em700);color:var(--white);border:none;border-radius:var(--r);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;transition:background .2s,transform .1s;}
.btn-login:hover:not(:disabled){background:var(--em800);}
.btn-login:active:not(:disabled){transform:scale(.99);}
.btn-login:disabled{opacity:.7;cursor:not-allowed;}
.alert-box{border-radius:var(--r);padding:8px 12px;font-size:12.5px;display:flex;align-items:center;gap:8px;margin-top:10px;}
.alert-error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;}
.alert-success{background:var(--em50);border:1px solid var(--em200);color:var(--em800);}
.tab-content{display:none;}
.tab-content.active{display:block;}
footer{margin-top:14px;text-align:center;font-size:12px;color:var(--em700);opacity:.75;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-height:620px){.login-logo{width:40px;height:40px;margin-bottom:4px;}.login-header{margin-bottom:10px;}.login-body{padding:14px 20px 12px;}.form-group{margin-bottom:8px;}.form-subtitle{margin-bottom:10px;}.btn-login{margin-top:10px;}footer{margin-top:10px;}}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-header">
    <img class="login-logo" src="https://i.imgur.com/dYwR4Jp.png" alt="Logo Emes CBT">
    <div class="login-app-name">Emes CBT</div>
    <div class="login-app-sub">Computer-Based Test System</div>
    <div class="school-name" id="schoolName">Memuat...</div>
  </div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="tab-btn active" id="tab-btn-siswa" onclick="switchTab('siswa')"><i class="fas fa-user-graduate"></i> Peserta</button>
      <button class="tab-btn" id="tab-btn-admin" onclick="switchTab('admin')"><i class="fas fa-user-shield"></i> Administrator</button>
    </div>
    <div class="tab-content active" id="tab-siswa">
      <div class="login-body">
        <div class="form-title">Masuk sebagai Peserta</div>
        <div class="form-subtitle">Gunakan username dan password yang diberikan guru</div>
        <div class="form-group">
          <label class="form-label" for="s-user">Username</label>
          <div class="input-wrapper"><i class="fas fa-user input-icon"></i><input class="form-control" type="text" id="s-user" placeholder="Masukkan username" autocomplete="username"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="s-pass">Password</label>
          <div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input class="form-control" type="password" id="s-pass" placeholder="Masukkan password" autocomplete="current-password"><button class="toggle-pw" onclick="togglePw('s-pass',this)" tabindex="-1"><i class="fas fa-eye"></i></button></div>
        </div>
        <div id="alert-siswa"></div>
        <div class="form-group">
          <label class="form-label">Verifikasi Keamanan</label>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <canvas id="captcha-siswa-canvas" width="180" height="52" style="border-radius:8px;border:1.5px solid var(--em200);background:#f8fafc;cursor:pointer;" title="Klik untuk refresh" onclick="generateCaptcha('siswa')"></canvas>
            <button type="button" onclick="generateCaptcha('siswa')" style="background:none;border:none;cursor:pointer;color:var(--em600);font-size:20px;padding:4px;"><i class="fas fa-sync-alt"></i></button>
          </div>
          <input class="form-control" type="text" id="captcha-siswa-ans" placeholder="Ketik karakter di atas" autocomplete="off" maxlength="6">
        </div>
        <button class="btn-login" id="btn-siswa" onclick="doLogin('siswa')"><i class="fas fa-sign-in-alt"></i> Masuk</button>
      </div>
    </div>
    <div class="tab-content" id="tab-admin">
      <div class="login-body">
        <div class="form-title">Masuk sebagai Administrator</div>
        <div class="form-subtitle">Panel pengelolaan sistem CBT</div>
        <div class="form-group">
          <label class="form-label" for="a-user">Username Admin</label>
          <div class="input-wrapper"><i class="fas fa-user-shield input-icon"></i><input class="form-control" type="text" id="a-user" placeholder="Username admin" autocomplete="username"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="a-pass">Password</label>
          <div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input class="form-control" type="password" id="a-pass" placeholder="Password admin" autocomplete="current-password"><button class="toggle-pw" onclick="togglePw('a-pass',this)" tabindex="-1"><i class="fas fa-eye"></i></button></div>
        </div>
        <div id="alert-admin"></div>
        <div class="form-group">
          <label class="form-label">Verifikasi Keamanan</label>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <canvas id="captcha-admin-canvas" width="180" height="52" style="border-radius:8px;border:1.5px solid var(--em200);background:#f8fafc;cursor:pointer;" title="Klik untuk refresh" onclick="generateCaptcha('admin')"></canvas>
            <button type="button" onclick="generateCaptcha('admin')" style="background:none;border:none;cursor:pointer;color:var(--em600);font-size:20px;padding:4px;"><i class="fas fa-sync-alt"></i></button>
          </div>
          <input class="form-control" type="text" id="captcha-admin-ans" placeholder="Ketik karakter di atas" autocomplete="off" maxlength="6">
        </div>
        <button class="btn-login" id="btn-admin" onclick="doLogin('admin')"><i class="fas fa-sign-in-alt"></i> Masuk</button>
      </div>
    </div>
  </div>
  <footer>© Emes EduTech</footer>
</div>
<script>
var APP_URL = '/api/app';
var _captcha = {};
var _activeTab = 'siswa';

function switchTab(tab) {
  _activeTab = tab;
  document.getElementById('tab-btn-siswa').classList.toggle('active', tab === 'siswa');
  document.getElementById('tab-btn-admin').classList.toggle('active', tab === 'admin');
  document.getElementById('tab-siswa').classList.toggle('active', tab === 'siswa');
  document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
}

function togglePw(id, btn) {
  var input = document.getElementById(id);
  var icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fas fa-eye'; }
}

function showAlert(elId, type, msg) {
  document.getElementById(elId).innerHTML =
    '<div class="alert-box alert-' + type + '"><i class="fas fa-' +
    (type === 'error' ? 'times-circle' : 'check-circle') + '"></i> ' + msg + '</div>';
}
function clearAlert(elId) { document.getElementById(elId).innerHTML = ''; }

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Memproses...'; }
  else { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk'; }
}

async function doLogin(role) {
  var isAdmin = role === 'admin';
  var user = document.getElementById(isAdmin ? 'a-user' : 's-user').value.trim();
  var pass = document.getElementById(isAdmin ? 'a-pass' : 's-pass').value;
  var alertId = 'alert-' + role, btnId = 'btn-' + role;
  clearAlert(alertId);
  if (!user || !pass) { showAlert(alertId, 'error', 'Username dan password wajib diisi.'); return; }
  var captchaAns = document.getElementById('captcha-' + role + '-ans');
  if (captchaAns && captchaAns.value.trim().toUpperCase() !== _captcha[role]) {
    showAlert(alertId, 'error', 'Kode verifikasi salah. Silakan coba lagi.');
    generateCaptcha(role); return;
  }
  setLoading(btnId, true);
  try {
    var res = await fetch(APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: isAdmin ? 'loginAdmin' : 'login', username: user, password: pass })
    });
    var data = await res.json();
    if (data.success) {
      localStorage.setItem('emes_token', data.token);
      localStorage.setItem('emes_role', data.role || (isAdmin ? 'admin' : 'siswa'));
      localStorage.setItem('emes_user', JSON.stringify(data));
      showAlert(alertId, 'success', 'Login berhasil, mengalihkan...');
      setTimeout(function() {
        window.location.href = ['admin','guru','proktor'].includes(data.role || '') || isAdmin ? '/admin' : '/siswa';
      }, 700);
    } else {
      showAlert(alertId, 'error', data.message || 'Login gagal.');
      generateCaptcha(role); setLoading(btnId, false);
    }
  } catch(e) {
    showAlert(alertId, 'error', 'Gagal menghubungi server. Coba lagi.');
    setLoading(btnId, false);
  }
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(_activeTab); });

function generateCaptcha(role) {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  _captcha[role] = code;
  var canvas = document.getElementById('captcha-' + role + '-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#eef2ff'); bg.addColorStop(1,'#f0fdf4');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  for (var i=0;i<60;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.5,0,Math.PI*2);ctx.fillStyle='rgba(100,100,200,'+(Math.random()*.35+.1)+')';ctx.fill();}
  for (var i=0;i<4;i++){ctx.beginPath();ctx.moveTo(Math.random()*W,Math.random()*H);ctx.bezierCurveTo(Math.random()*W,Math.random()*H,Math.random()*W,Math.random()*H,Math.random()*W,Math.random()*H);ctx.strokeStyle='rgba(80,80,200,.2)';ctx.lineWidth=1.2;ctx.stroke();}
  var colors=['#4338ca','#0f766e','#b45309','#7c3aed','#0369a1','#be123c'],charW=W/(code.length+1);
  for (var i=0;i<code.length;i++){ctx.save();ctx.translate(charW*(i+.9)+Math.random()*4-2,H/2+Math.random()*8-4);ctx.rotate((Math.random()-.5)*.5);ctx.font='bold '+(Math.floor(Math.random()*6)+22)+'px "Courier New",monospace';ctx.fillStyle=colors[i%colors.length];ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=2;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(code[i],0,0);ctx.restore();}
  var ans = document.getElementById('captcha-' + role + '-ans'); if(ans) ans.value='';
}

// Load nama sekolah
fetch(APP_URL, {
  method: 'POST', headers: {'Content-Type':'application/json'},
  body: JSON.stringify({action:'getPengaturanPublik'})
}).then(function(r){return r.json();}).then(function(d){
  if(d.success) document.getElementById('schoolName').textContent = d.data.nama_sekolah || 'Sistem Ujian Online';
}).catch(function(){ document.getElementById('schoolName').textContent = ''; });

// Redirect jika sudah login
var t = localStorage.getItem('emes_token'), r = localStorage.getItem('emes_role');
if (t && r) { window.location.href = ['admin','guru','proktor'].includes(r) ? '/admin' : '/siswa'; }

generateCaptcha('siswa');
generateCaptcha('admin');
</script>
</body>
</html>
